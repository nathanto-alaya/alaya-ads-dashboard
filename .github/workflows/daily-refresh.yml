name: Daily Ads Dashboard Refresh

# Runs every day at 8:00 AM Sydney time (22:00 UTC)
# Also can be triggered manually from the Actions tab
on:
  schedule:
    - cron: '0 22 * * *'  # 22:00 UTC = 8:00 AM AEST / 9:00 AM AEDT
  workflow_dispatch:  # Manual trigger button in GitHub UI

permissions:
  contents: write  # needed to commit the updated data.json

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Pull Meta Ads data and update data.json
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
        run: python3 update_dashboard.py

      - name: Commit and push if data.json changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if ! git diff --cached --quiet; then
            git commit -m "Daily refresh - $(date -u +'%Y-%m-%d')"
            git push
          else
            echo "No changes to commit"
          fi
